@if (project(); as p) {
  <section class="pt-32 pb-24 bg-white dark:bg-slate-900 min-h-screen transition-colors">
    <div class="max-w-4xl mx-auto px-4">
      <a routerLink="/" class="inline-flex items-center text-blue-600 dark:text-blue-400 font-semibold mb-8 hover:-translate-x-1 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Voltar para Home
      </a>

      <div class="relative h-64 md:h-96 rounded-3xl overflow-hidden mb-12 shadow-2xl">
        <img ngSrc="images/projects/default.jpg" fill class="object-cover" [alt]="p.title">
      </div>

      <div class="flex flex-wrap gap-2 mb-6">
        @for (tech of p.tecnosUsed; track tech) {
          @let info = getTechInfo(tech);
          <span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-lg font-medium border border-slate-200 dark:border-slate-700">
            {{ info?.realName || tech }}
          </span>
        }
      </div>

      <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-6">{{ p.title }}</h1>
      
      <div class="prose prose-lg dark:prose-invert max-w-none">
        <p class="text-xl text-slate-600 dark:text-slate-400 leading-relaxed mb-8">
          {{ p.longDescription }}
        </p>
      </div>

      <div class="flex flex-wrap gap-4 mt-12 pt-12 border-t border-slate-100 dark:border-slate-800">
        @if (p.produtionLink) {
          <a [href]="p.produtionLink" target="_blank" class="px-8 py-3 bg-blue-600 text-white rounded-full font-bold hover:bg-blue-700 transition-all">Ver Site em Produção</a>
        }
        @if (p.repositoryLink) {
          <a [href]="p.repositoryLink" target="_blank" class="px-8 py-3 bg-slate-900 dark:bg-slate-800 text-white rounded-full font-bold hover:bg-black dark:hover:bg-black transition-all">Ver Código no GitHub</a>
        }
      </div>
    </div>
  </section>
}
