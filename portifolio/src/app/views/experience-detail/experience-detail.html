@if (experience(); as e) {
  <section class="pt-32 pb-24 bg-white dark:bg-slate-900 min-h-screen transition-colors">
    <div class="max-w-4xl mx-auto px-4">
      <a routerLink="/" class="inline-flex items-center text-blue-600 dark:text-blue-400 font-semibold mb-8 hover:-translate-x-1 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Voltar para Home
      </a>

      <div class="flex flex-col md:flex-row gap-12 items-center md:items-start mb-16">
        <div class="w-32 h-32 md:w-48 md:h-48 flex-shrink-0 bg-slate-50 dark:bg-slate-800 rounded-3xl overflow-hidden flex items-center justify-center p-4 shadow-xl">
          <img 
            [ngSrc]="'images/experiences/' + e.imageName + '.jpeg'" 
            width="120" 
            height="120" 
            class="object-contain" 
            [alt]="e.title">
        </div>

        <div>
          <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-4">{{ e.title }}</h1>
          @if (e.link) {
            <a [href]="e.link" target="_blank" class="text-blue-600 dark:text-blue-400 font-semibold flex items-center gap-2 hover:underline">
              Visitar Instituição
              <img ngSrc="images/icons/arrow-up-right-from-square-svgrepo-com.svg" width="16" height="16" alt="" class="dark:brightness-0 dark:invert">
            </a>
          }
        </div>
      </div>
      
      <div class="prose prose-lg dark:prose-invert max-w-none mb-12">
        <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-200 mb-4">Sobre a Experiência</h2>
        <p class="text-xl text-slate-600 dark:text-slate-400 leading-relaxed">
          {{ e.longDescription }}
        </p>
      </div>

      <div class="pt-12 border-t border-slate-100 dark:border-slate-800">
        <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-200 mb-6">Habilidades e Tecnologias Aplicadas</h2>
        <div class="flex flex-wrap gap-3">
          @for (skill of e.skillsLearned; track skill) {
            @let info = getTechInfo(skill);
            <span class="px-4 py-2 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-full font-bold">
              {{ info?.realName || skill }}
            </span>
          }
        </div>
      </div>
    </div>
  </section>
}
