<section class="min-h-screen pt-32 pb-24 bg-slate-50 dark:bg-slate-950 transition-colors flex items-center justify-center">
  <div class="max-w-md w-full px-6">
    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800">
      <div class="text-center mb-10">
        <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2">Login Admin</h1>
        <p class="text-slate-500 dark:text-slate-400">Entre para gerenciar seu portfólio</p>
      </div>

      @if (error()) {
        <div class="mb-6 p-4 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-xl text-sm border border-red-100 dark:border-red-900/50">
          {{ error() }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email</label>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
            placeholder="seu@email.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Senha</label>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
            placeholder="••••••••">
        </div>

        <button 
          type="submit" 
          [disabled]="loginForm.invalid || isLoading()"
          class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-200 dark:shadow-none hover:bg-blue-700 transition-all transform hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed">
          @if (isLoading()) {
            Entrando...
          } @else {
            Entrar
          }
        </button>
      </form>

      <div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-800 text-center">
        <a href="/" class="text-sm font-semibold text-blue-600 dark:text-blue-400 hover:underline">Voltar para o Portfólio</a>
      </div>
    </div>
  </div>
</section>
