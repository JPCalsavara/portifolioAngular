<footer class="bg-slate-900 dark:bg-black text-white py-16 transition-colors">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <div class="mb-8">
      <img ngSrc="images/social/jc-icon.svg" width="60" height="60" alt="JC Logo" class="mx-auto brightness-0 invert opacity-80 mb-4">
      <h2 class="text-2xl font-bold">JP Calsavara</h2>
      <p class="text-slate-400 mt-2">Construindo o futuro através do código.</p>
    </div>

    <div class="flex justify-center gap-8 mb-12">
      <a href="https://github.com/JPCalsavara" target="_blank" class="text-slate-400 hover:text-white transition-colors">GitHub</a>
      <a href="https://www.linkedin.com/in/joao-pedro-calsavara/" target="_blank" class="text-slate-400 hover:text-white transition-colors">LinkedIn</a>
      <a href="mailto:jpcalsavara@gmail.com" class="text-slate-400 hover:text-white transition-colors">Email</a>
    </div>

    <div class="pt-8 border-t border-slate-800 text-slate-500 text-sm flex flex-col items-center gap-4">
      <p>&copy; {{ currentYear }} JP Calsavara. Todos os direitos reservados.</p>
      
      <!-- Admin Toggle Button -->
      @if (authService.isAdmin()) {
        <button 
          (click)="onLogout()"
          class="mt-4 px-4 py-2 border border-red-500 text-red-500 bg-red-500/10 rounded-lg transition-all text-xs font-bold uppercase tracking-widest"
        >
          Sair do Modo Admin
        </button>
      } @else {
        <a 
          routerLink="/login"
          class="mt-4 px-4 py-2 border border-slate-700 text-slate-500 hover:border-slate-600 rounded-lg transition-all text-xs font-bold uppercase tracking-widest"
        >
          Área do Administrador
        </a>
      }

      <p class="mt-2 text-slate-600">Feito com Angular & Tailwind CSS</p>
    </div>
  </div>
</footer>
