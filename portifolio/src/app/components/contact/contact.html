<section id="contact" class="py-24 bg-slate-50 dark:bg-slate-950 transition-colors">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-blue-600 dark:text-blue-400 font-bold tracking-wider uppercase text-sm mb-3">Contato</h2>
      <h3 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white mb-4">Vamos Conversar?</h3>
      <div class="w-20 h-1.5 bg-blue-600 mx-auto rounded-full"></div>
    </div>

    <div class="bg-white dark:bg-slate-900 p-8 md:p-12 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="name" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Nome</label>
            <input 
              type="text" 
              id="name" 
              formControlName="name" 
              class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
              placeholder="Seu nome">
          </div>
          <div>
            <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email</label>
            <input 
              type="email" 
              id="email" 
              formControlName="email" 
              class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
              placeholder="seu@email.com">
          </div>
        </div>

        <div>
          <label for="subject" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Assunto</label>
          <input 
            type="text" 
            id="subject" 
            formControlName="subject" 
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none"
            placeholder="No que posso ajudar?">
        </div>

        <div>
          <label for="message" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Mensagem</label>
          <textarea 
            id="message" 
            rows="5" 
            formControlName="message" 
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none resize-none"
            placeholder="Sua mensagem aqui..."></textarea>
        </div>

        <button 
          type="submit" 
          [disabled]="contactForm.invalid"
          class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-200 dark:shadow-none hover:bg-blue-700 transition-all transform hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed">
          Enviar Mensagem
        </button>
      </form>
    </div>
  </div>
</section>
