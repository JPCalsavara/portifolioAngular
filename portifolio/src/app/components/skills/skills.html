<section id="skills" class="py-24 bg-slate-50 dark:bg-slate-900 transition-colors">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-blue-600 dark:text-blue-400 font-bold tracking-wider uppercase text-sm mb-3">Conhecimentos</h2>
      <h3 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white mb-4">Minhas Habilidades</h3>
      <div class="w-20 h-1.5 bg-blue-600 mx-auto rounded-full"></div>
      
      <!-- Legend Section -->
      <div class="flex flex-wrap justify-center gap-4 mt-8">
        @for (item of legendItems(); track item.label) {
          <div 
            (mouseenter)="setHoverType(item.type)" 
            (mouseleave)="setHoverType(null)"
            class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm cursor-pointer hover:scale-105 transition-all active:scale-95"
          >
            <span [class]="'w-3 h-3 rounded-full ' + item.color"></span>
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ item.label }}</span>
          </div>
        }
      </div>
    </div>

    <div class="space-y-12">
      @for (category of categories(); track category) {
        @let skills = groupedSkills()[category];
        @if (skills.length > 0) {
          <div>
            <h4 class="text-xl font-bold text-slate-800 dark:text-slate-200 mb-6 flex items-center gap-3">
              <span class="w-8 h-1 bg-blue-600 rounded-full"></span>
              {{ category }}
            </h4>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
              @for (skill of skills; track skill.name) {
                <app-skill-card 
                  [skill]="skill" 
                  [isActive]="activeLegendType() === skill.type || activeLegendType() === null" 
                />
              }
            </div>
          </div>
        }
      }
    </div>
  </div>
</section>
