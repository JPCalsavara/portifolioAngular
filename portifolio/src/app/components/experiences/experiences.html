<section id="experiences" class="py-24 bg-white dark:bg-slate-900 transition-colors">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      @if(isProfessional()){
        <h2 class="text-blue-600 dark:text-blue-400 font-bold tracking-wider uppercase text-sm mb-3">Formação</h2>
        <h3 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white mb-4">Experiência Profissional</h3>
      }
      @else{
        <h2 class="text-blue-600 dark:text-blue-400 font-bold tracking-wider uppercase text-sm mb-3">Trajetória</h2>
        <h3 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white mb-4">Experiência Acadêmica e Extensão</h3>
      }
      <div class="w-20 h-1.5 bg-blue-600 mx-auto rounded-full"></div>
    </div>

    <div class="space-y-8">
      @for (experience of experiences(); track experience.title) {
        <app-experience-card [experience]="experience" />
      }
    </div>
  </div>
</section>
