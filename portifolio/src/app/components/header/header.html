<header class="fixed top-0 left-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-50 border-b border-gray-100 dark:border-slate-800 transition-colors">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <div class="flex items-center">
      <a href="#home" class="flex items-center space-x-2" (click)="closeMenu()">
        <img ngSrc="images/social/jc-icon.svg" width="40" height="40" alt="JC Logo" priority class="dark:brightness-0 dark:invert">
        <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">JP Calsavara</span>
      </a>
    </div>

    <!-- Desktop Menu -->
    <div class="hidden md:flex items-center space-x-8">
      <a href="#home" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors">Home</a>
      <a href="#projects" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors">Projetos</a>
      <a href="#skills" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors">Skills</a>
      <a href="#experiences" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors">Experiências</a>
      
      <!-- Theme Toggle -->
      <button 
        (click)="themeService.toggleTheme()"
        class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all"
        aria-label="Toggle theme"
      >
        @if (themeService.theme() === 'light') {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707" />
          </svg>
        }
      </button>

      <a href="files/curriculo.pdf" target="_blank" class="bg-blue-600 text-white px-5 py-2 rounded-full font-medium hover:bg-blue-700 transition-all shadow-sm">Currículo</a>
    </div>

    <!-- Mobile Menu Toggle -->
    <div class="flex items-center md:hidden gap-4">
       <button 
        (click)="themeService.toggleTheme()"
        class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300"
        aria-label="Toggle theme"
      >
        @if (themeService.theme() === 'light') {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707" />
          </svg>
        }
      </button>

      <button 
        type="button" 
        (click)="toggleMenu()"
        class="text-gray-600 dark:text-gray-300 hover:text-blue-600 focus:outline-none p-2"
        [attr.aria-expanded]="isMenuOpen()"
        aria-label="Toggle menu"
      >
        @if (isMenuOpen()) {
          <img ngSrc="images/icons/close-svgrepo-com.svg" width="24" height="24" alt="Fechar menu" class="dark:brightness-0 dark:invert">
        } @else {
          <img ngSrc="images/icons/menu-svgrepo-com.svg" width="24" height="24" alt="Abrir menu" class="dark:brightness-0 dark:invert">
        }
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  @if (isMenuOpen()) {
    <div class="md:hidden bg-white dark:bg-slate-900 border-t border-gray-100 dark:border-slate-800 animate-in slide-in-from-top duration-300">
      <div class="px-4 pt-2 pb-6 space-y-1 sm:px-3">
        <a href="#home" (click)="closeMenu()" class="block px-3 py-4 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg">Home</a>
        <a href="#projects" (click)="closeMenu()" class="block px-3 py-4 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg">Projetos</a>
        <a href="#skills" (click)="closeMenu()" class="block px-3 py-4 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg">Skills</a>
        <a href="#experiences" (click)="closeMenu()" class="block px-3 py-4 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-800 rounded-lg">Experiências</a>
        <div class="pt-4 px-3">
          <a href="files/curriculo.pdf" target="_blank" (click)="closeMenu()" class="block w-full text-center bg-blue-600 text-white px-5 py-3 rounded-lg font-medium hover:bg-blue-700 transition-all">Currículo</a>
        </div>
      </div>
    </div>
  }
</header>
