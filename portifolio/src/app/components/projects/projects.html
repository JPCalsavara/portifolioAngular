<section id="projects" class="py-24 bg-white dark:bg-slate-900 transition-colors">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16 relative">
      <h2 class="text-blue-600 dark:text-blue-400 font-bold tracking-wider uppercase text-sm mb-3">Meus Trabalhos</h2>
      <h3 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white mb-4">Projetos em Destaque</h3>
      <div class="w-20 h-1.5 bg-blue-600 mx-auto rounded-full"></div>

      <!-- Admin Add Button -->
      @if (authService.isAdmin()) {
        <button 
          class="absolute right-0 top-0 p-3 bg-amber-500 text-white rounded-full shadow-lg hover:bg-amber-600 transition-all transform hover:scale-110 active:scale-95 group"
          title="Adicionar Novo Projeto"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          <span class="absolute right-14 top-1/2 -translate-y-1/2 px-3 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
            Novo Projeto (Supabase)
          </span>
        </button>
      }
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (project of projects(); track project.title) {
        <app-project-card [project]="project" />
      }
    </div>
  </div>
</section>
