<div 
  class="flex flex-col items-center justify-center p-6 bg-white dark:bg-slate-800 rounded-2xl border-2 transition-all duration-300 group shadow-sm"
  [class]="getBorderColor()"
>
  <div class="w-16 h-16 mb-4 flex items-center justify-center p-2 bg-slate-50 dark:bg-slate-700 rounded-xl group-hover:bg-blue-50 dark:group-hover:bg-blue-900/30 transition-colors">
    <img 
      [ngSrc]="getIconPath(skill().name)" 
      width="48" 
      height="48" 
      class="object-contain" 
      [alt]="skill().label">
  </div>
  <span class="text-sm font-bold text-slate-700 dark:text-slate-200 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors text-center">
    {{ skill().label }}
  </span>
</div>
